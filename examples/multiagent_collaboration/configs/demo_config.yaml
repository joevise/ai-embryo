# FuturEmbryo多智能体协作系统 - 演示配置
# 基于FuturEmbryo DNA系统的用户中心@机制配置

# 系统基础配置
system:
  name: "个人AI协作助手"
  version: "1.0.0"
  description: "基于FuturEmbryo的用户感知多智能体协作系统"
  
# API配置（复用FuturEmbryo配置）
api:
  key: "sk-tptTrlFHR14EDpg"
  base_url: "https://litellm.futurx.cc/v1"
  timeout: 300

# 用户记忆系统配置
user_memory:
  enabled: true
  auto_learning: true
  
  # 触发显式记忆的关键词
  explicit_memory_keywords:
    - "记住这个"
    - "请记录"
    - "重要的是"
    - "注意"
    - "保存"
    - "记下来"
    
  # 记忆保留和更新设置
  memory_retention_days: 365
  profile_update_threshold: 0.1
  preference_learning_rate: 0.1
  
  # 用户画像自动更新频率
  profile_update_frequency: "daily"
  
  # 存储配置
  storage:
    embedding_model: "text-embedding-ada-002"
    collection_name: "user_memory"
    db_path: "./memory_db"

# Agent配置 - 基于模板系统
agents:
  # 研究员Agent
  researcher:
    template: "researcher_template"
    id: "researcher"
    customizations:
      focus_areas: 
        - "技术趋势"
        - "市场分析"
        - "行业报告"
      data_sources:
        - "web_search"
        - "knowledge_base"
        - "mcp_tools"
      output_style: "@user-preferences.detail_level"  # 引用用户偏好
      
  # 分析师Agent  
  analyst:
    template: "analyst_template"
    id: "analyst"
    customizations:
      analysis_types:
        - "数据分析"
        - "趋势分析"
        - "对比分析"
      visualization_tools:
        - "charts"
        - "graphs"
        - "dashboards"
      detail_level: "@user-preferences.analysis_depth"
      
  # 写作者Agent
  writer:
    template: "writer_template" 
    id: "writer"
    customizations:
      content_types:
        - "报告"
        - "总结"
        - "方案"
        - "文档"
      writing_style: "@user-preferences.communication_style"
      tone: "@user-profile.personality_preference"
      
  # 创意专家Agent
  creative:
    template: "creative_template"
    id: "creative"
    customizations:
      creativity_areas:
        - "产品创新"
        - "解决方案"
        - "概念设计"
      ideation_methods:
        - "头脑风暴"
        - "类比思维"
        - "反向思考"
        
  # 规划师Agent
  planner:
    template: "planner_template"
    id: "planner"
    customizations:
      planning_scope:
        - "项目规划"
        - "任务分解"
        - "时间管理"
      methodology:
        - "敏捷规划"
        - "瀑布模型"
        - "混合方法"

# 工作流配置
workflows:
  # 个人研究工作流
  personal_research:
    id: "personal-research"
    name: "个人研究工作流"
    description: "基于用户兴趣的深度研究流程"
    steps:
      - name: "load_user_context"
        action: "load_context"
        objects: ["@user-profile", "@user-memory", "@user-preferences"]
        
      - name: "research_phase"
        agent: "@researcher"
        context_aware: true
        inputs: ["@user-memory.research_interests"]
        
      - name: "analysis_phase"
        agent: "@analyst"
        inputs: ["@researcher.output"]
        context: ["@user-preferences.analysis_style"]
        
      - name: "writing_phase"
        agent: "@writer"
        inputs: ["@analyst.output", "@researcher.output"]
        style: "@user-preferences.communication_style"
        
    output_format: "structured_report"
    
  # 创意开发工作流
  creative_development:
    id: "creative-development"
    name: "创意开发工作流"
    description: "从创意生成到方案实施的完整流程"
    steps:
      - name: "ideation"
        agent: "@creative"
        context: ["@user-profile.interests"]
        
      - name: "feasibility_analysis"
        agent: "@analyst"
        inputs: ["@creative.ideas"]
        
      - name: "implementation_planning"
        agent: "@planner"
        inputs: ["@creative.ideas", "@analyst.feasibility"]
        
      - name: "documentation"
        agent: "@writer"
        inputs: ["@planner.plan"]
        format: "implementation_guide"
        
  # 决策支持工作流
  decision_support:
    id: "decision-support"
    name: "决策支持工作流"
    description: "多角度分析支持复杂决策"
    steps:
      - name: "research_background"
        agent: "@researcher"
        scope: "comprehensive"
        
      - name: "data_analysis"
        agent: "@analyst"
        inputs: ["@researcher.findings"]
        analysis_type: "multi_dimensional"
        
      - name: "creative_alternatives"
        agent: "@creative"
        context: ["@analyst.insights"]
        
      - name: "implementation_options"
        agent: "@planner"
        inputs: ["@creative.alternatives"]
        
      - name: "final_report"
        agent: "@writer"
        inputs: ["@researcher.findings", "@analyst.insights", "@creative.alternatives", "@planner.options"]
        format: "decision_matrix"

# @引用系统配置
mention_system:
  enabled: true
  
  # 内置@引用对象
  builtin_mentions:
    - id: "user-profile"
      type: "user"
      name: "用户画像"
      description: "用户的基本信息、兴趣爱好和专业领域"
      
    - id: "user-memory"
      type: "user" 
      name: "用户记忆"
      description: "用户明确要求记录的重要信息和历史对话"
      
    - id: "user-preferences"
      type: "user"
      name: "用户偏好"
      description: "用户的沟通风格、内容偏好和交互习惯"
      
  # 自动注册设置
  auto_register:
    agents: true
    workflows: true
    deliverables: true
    
  # 搜索和建议设置
  search:
    max_suggestions: 10
    enable_fuzzy_search: true
    suggestion_threshold: 0.3

# 用户行为学习配置
learning:
  enabled: true
  
  # 偏好学习触发器
  preference_triggers:
    satisfaction_signals:
      positive: ["很好", "不错", "满意", "喜欢", "正是我要的", "完美"]
      negative: ["不对", "错了", "不够", "太复杂", "太简单", "不满意"]
      
  # 画像更新触发器
  profile_triggers:
    interest_patterns:
      - "我对(.+?)感兴趣"
      - "我喜欢(.+?)"
      - "我关注(.+?)领域"
      - "我研究(.+?)"
      
    expertise_patterns:
      - "我是(.+?)专家"
      - "我在(.+?)方面有经验"
      - "我从事(.+?)工作"
      
    style_patterns:
      - "我喜欢(.+?)的回复"
      - "请(.+?)一些"
      - "希望(.+?)详细"

# 工具和集成配置
tools:
  # 默认工具
  defaults: true
  
  # MCP服务器配置（暂时禁用）
  mcp_servers: []
    # - name: "context7"
    #   url: "http://localhost:3000/v1/mcp" 
    #   transport: "sse"
    #   description: "技术文档查询工具"
      
  # 自定义工具配置
  custom_tools:
    enabled: true
    auto_register: true

# 上下文管理配置
context:
  # 对话历史管理
  history_limit: 20
  message_max_length: 1000
  
  # 上下文压缩
  compression:
    enabled: true
    threshold: 0.8
    method: "intelligent"
    
  # 用户上下文注入
  user_context_injection:
    enabled: true
    include_profile: true
    include_preferences: true
    include_recent_memories: true
    max_memories: 5

# 产出物管理配置
deliverables:
  auto_generation:
    enabled: true
    
    # 自动生成触发条件
    triggers:
      content_length: 500  # 超过500字符
      keywords: ["分析", "报告", "总结", "方案", "建议", "计划"]
      agent_types: ["researcher", "analyst", "writer", "planner"]
      
  # 产出物分类
  categories:
    - name: "reports"
      display_name: "报告"
      extensions: [".md", ".txt", ".pdf"]
      
    - name: "analyses" 
      display_name: "分析"
      extensions: [".json", ".csv", ".xlsx"]
      
    - name: "plans"
      display_name: "计划"
      extensions: [".md", ".json"]
      
    - name: "creatives"
      display_name: "创意"
      extensions: [".md", ".txt"]

# 演示和调试配置
demo:
  # 演示模式设置
  mode: "interactive"  # interactive/batch/automated
  
  # 预设演示场景
  scenarios:
    - name: "personal_assistant"
      description: "个人助手场景演示"
      initial_prompt: "你好！我对AI技术发展很感兴趣，希望了解最新趋势"
      
    - name: "business_analysis"
      description: "商业分析场景演示" 
      initial_prompt: "我需要分析一下我们公司进入AI市场的可行性"
      
    - name: "creative_project"
      description: "创意项目场景演示"
      initial_prompt: "我想为我们的产品设计一个创新的营销方案"
      
  # 调试设置
  debug:
    enabled: true
    log_level: "INFO"
    log_user_learning: true
    log_mention_processing: true
    
# 性能和限制配置
performance:
  # 并发控制
  max_concurrent_agents: 3
  
  # 超时设置
  timeouts:
    agent_response: 120  # 2分钟
    workflow_execution: 300  # 5分钟
    user_learning: 30  # 30秒
    
  # 资源限制
  limits:
    max_memory_entries: 1000
    max_deliverables: 100
    max_mentions_per_input: 10