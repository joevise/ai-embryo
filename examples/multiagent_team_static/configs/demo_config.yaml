# FuturEmbryo 多智能体静态团队配置文件

# API配置
api:
  key: "sk-tptTrlFHR14EDpg"
  base_url: "https://litellm.futurx.cc/v1"

# 用户记忆系统配置
user_memory:
  max_memories: 100
  enable_learning: true
  learning_rate: 0.1

# @引用系统配置  
mention_system:
  enable_auto_complete: true
  max_deliverables: 50

# Agent配置
agents:
  researcher:
    template: "researcher_template"
    customizations:
      name: "研究专家"
      temperature: 0.7
      
  analyst:
    template: "analyst_template"
    customizations:
      name: "数据分析师"
      temperature: 0.5
      
  writer:
    template: "writer_template"
    customizations:
      name: "内容创作者"
      temperature: 0.8
      
  creative:
    template: "creative_template"
    customizations:
      name: "创意设计师"
      temperature: 0.9
      
  planner:
    template: "planner_template"
    customizations:
      name: "项目规划师"
      temperature: 0.6

# 演示场景配置
demo:
  scenarios:
    - name: "personal_assistant"
      description: "个人助理场景"
      initial_prompt: "我需要制定下周的工作计划，重点是完成产品发布准备"
      
    - name: "business_analysis"
      description: "商业分析场景"
      initial_prompt: "请帮我分析当前AI行业的投资机会和风险"
      
    - name: "creative_project"
      description: "创意项目场景"
      initial_prompt: "我想创建一个关于可持续发展的社交媒体营销活动"