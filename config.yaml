# AI Embryo Engine Configuration
server:
  host: "0.0.0.0"
  port: 8010

# LLM Provider Configuration
# Users configure their own API keys and models
llm:
  provider: "openai"  # openai / anthropic / custom
  api_key: ""  # Set via env var AI_EMBRYO_API_KEY or here
  base_url: ""  # Custom API endpoint (for OpenAI-compatible APIs like LiteLLM, MiniMax, etc.)
  model: "gpt-4"
  temperature: 0.7
  max_tokens: 2000

# Evolution defaults
evolution:
  default_population_size: 8
  default_generations: 10
  selection_ratio: 0.5
  elitism: 1
