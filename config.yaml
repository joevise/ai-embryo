# AI Embryo Engine Configuration
server:
  host: "0.0.0.0"
  port: 8010

# LLM Provider Configuration
# Users configure their own API keys and models
llm:
  provider: "minimax"  # openai / anthropic / minimax / custom
  api_key: ""  # Set via env var MINIMAX_API_KEY or AI_EMBRYO_API_KEY
  base_url: "https://api.minimax.chat/v1"  # MiniMax API endpoint
  model: "MiniMax-M2.7"
  temperature: 0.7
  max_tokens: 2000

# Evolution defaults
evolution:
  default_population_size: 8
  default_generations: 10
  selection_ratio: 0.5
  elitism: 1
