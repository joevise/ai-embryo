# StateMemoryCell 适配器架构配置文件
# 
# 这个配置文件展示了如何配置StateMemoryCell以连接各种外部记忆服务

# 基础配置
routing_strategy: "priority"  # 路由策略: priority, parallel, fallback
result_aggregation: "merge"   # 结果聚合策略: merge, best, weighted
max_results_per_adapter: 10   # 每个适配器最大结果数
enable_caching: true          # 是否启用查询缓存
cache_ttl: 300               # 缓存存活时间（秒）

# 适配器配置列表
adapters:
  # FastGPT 知识库适配器 - 主要技术文档
  - type: "FastGPTAdapter"
    name: "fastgpt_technical"
    config:
      # FastGPT 服务配置
      base_url: "https://api.fastgpt.in"  # 或你的私有部署地址
      api_key: "${FASTGPT_API_KEY}"       # 环境变量或直接填写
      dataset_id: "${FASTGPT_DATASET_ID}" # 知识库ID
      
      # 搜索配置
      search_mode: "embedding"            # embedding | fullTextRecall | mixedRecall
      default_limit: 5000                 # token限制
      default_similarity: 0.0             # 最低相似度阈值
      using_rerank: true                  # 是否使用重排
      
      # 问题优化配置
      extension_query: true               # 是否启用问题优化
      extension_model: "gpt-4o-mini"      # 问题优化模型
      extension_bg: "这是一个技术文档知识库，包含AI、机器学习、深度学习等技术内容"
      
      # 适配器配置
      priority: 10                        # 优先级（数字越大优先级越高）
      enabled: true                       # 是否启用
      supported_query_types:              # 支持的查询类型
        - "technical"
        - "factual"
        - "all"

  # FastGPT 知识库适配器 - 通用知识
  - type: "FastGPTAdapter"
    name: "fastgpt_general"
    config:
      base_url: "https://api.fastgpt.in"
      api_key: "${FASTGPT_API_KEY}"
      dataset_id: "${FASTGPT_GENERAL_DATASET_ID}"
      
      search_mode: "mixedRecall"          # 混合召回适合通用查询
      default_limit: 3000
      default_similarity: 0.1
      using_rerank: false
      
      extension_query: true
      extension_model: "gpt-4o-mini"
      extension_bg: "这是一个通用知识库，包含常识、历史、文化等内容"
      
      priority: 5
      enabled: true
      supported_query_types:
        - "general"
        - "conversational"
        - "all"

  # 示例：未来可以添加的其他适配器
  # - type: "VectorDBAdapter"
  #   name: "company_vectordb"
  #   config:
  #     connection_string: "postgresql://..."
  #     collection_name: "company_docs"
  #     priority: 8
  #     enabled: false
  #     supported_query_types: ["company", "internal"]

  # - type: "KnowledgeGraphAdapter"
  #   name: "company_kg"
  #   config:
  #     neo4j_uri: "bolt://localhost:7687"
  #     username: "neo4j"
  #     password: "${NEO4J_PASSWORD}"
  #     priority: 6
  #     enabled: false
  #     supported_query_types: ["relationship", "entity"]

# 查询类型映射（可选）
# 定义不同查询类型的默认行为
query_type_mapping:
  technical:
    preferred_adapters: ["fastgpt_technical"]
    routing_strategy: "priority"
    result_aggregation: "best"
  
  general:
    preferred_adapters: ["fastgpt_general", "fastgpt_technical"]
    routing_strategy: "parallel"
    result_aggregation: "merge"
  
  factual:
    preferred_adapters: ["fastgpt_technical", "fastgpt_general"]
    routing_strategy: "fallback"
    result_aggregation: "best"

# 性能调优配置
performance:
  max_concurrent_requests: 5    # 最大并发请求数
  request_timeout: 30          # 请求超时时间（秒）
  retry_attempts: 2            # 重试次数
  retry_delay: 1               # 重试延迟（秒）

# 日志配置
logging:
  level: "INFO"                # DEBUG, INFO, WARNING, ERROR
  log_requests: true           # 是否记录请求日志
  log_responses: false         # 是否记录响应日志（可能包含敏感信息）

# 监控配置
monitoring:
  enable_metrics: true         # 是否启用指标收集
  metrics_interval: 60         # 指标收集间隔（秒）
  alert_on_failures: true     # 是否在失败时告警 